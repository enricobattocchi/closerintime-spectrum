<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Closer In Time — ZX Spectrum Edition</title>
    <script src="jsspeccy/jsspeccy.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: #ccc;
        }
        h1 {
            font-size: 1.2em;
            margin-bottom: 0.5em;
        }
        a { color: #6cf; }
        #jsspeccy { margin: 1em 0; }
        p { font-size: 0.85em; margin: 0.3em; }
    </style>
</head>
<body>
    <h1>Closer In Time — ZX Spectrum Edition</h1>
    <p>Click the screen to start, then wait for the program to load.</p>
    <div id="jsspeccy"></div>
    <p>Q/A = move, SPACE = select, G = show timeline</p>
    <p><a href="https://github.com/enricobattocchi/closerintime-spectrum">Source on GitHub</a>
     · Based on <a href="https://closerinti.me">closerinti.me</a></p>
    <script>
        JSSpeccy(document.getElementById('jsspeccy'), {
            zoom: 2,
            machine: 48,
            openUrl: 'closerintime.tzx',
            autoLoadTapes: true
        });
    </script>
</body>
</html>
