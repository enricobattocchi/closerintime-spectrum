name: Build TZX

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install ZX Spectrum tools
        run: sudo apt-get install -y zmakebas fuse-emulator-utils

      - name: Build TAP and TZX
        run: |
          zmakebas -n "CLOSERINT" -o closerintime.tap closerintime.bas
          tapeconv closerintime.tap closerintime.tzx

      - name: Attach files to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" closerintime.tap closerintime.tzx

      - name: Download JSSpeccy
        run: |
          curl -sL https://github.com/gasman/jsspeccy3/releases/download/v3.2/jsspeccy-3.2.zip -o jsspeccy.zip
          unzip -o -d jsspeccy-dist jsspeccy.zip

      - name: Prepare Pages
        run: |
          mkdir _site
          cp index.html closerintime.tzx _site/
          cp -r jsspeccy-dist/jsspeccy _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
