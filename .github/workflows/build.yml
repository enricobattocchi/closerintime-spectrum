name: Build TZX

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install ZX Spectrum tools
        run: sudo apt-get install -y zmakebas fuse-emulator-utils

      - name: Build TAP and TZX
        run: |
          zmakebas -a 1 -n "CLOSERINT" -o closerintime.tap closerintime.bas
          tapeconv closerintime.tap closerintime.tzx

      - name: Attach files to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" closerintime.tap closerintime.tzx
