name: Build TZX

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install ZX Spectrum tools
        run: sudo apt-get install -y zmakebas fuse-emulator-utils

      - name: Build TAP and TZX
        run: |
          zmakebas -a 1 -n "CLOSERINT" -o closerintime.tap closerintime.bas
          tapeconv closerintime.tap closerintime.tzx

      - name: Attach files to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" closerintime.tap closerintime.tzx

      - name: Download RAZE emulator
        run: |
          git clone --depth 1 --branch gh-pages https://github.com/rodrigorc/raze.git raze-dist

      - name: Prepare Pages
        run: |
          mkdir _site
          cp closerintime.tzx _site/
          cp site/index.html _site/
          cp site/raze.js _site/
          cp raze-dist/base64.js raze-dist/raze.css _site/
          cp -r raze-dist/pkg _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
